- name: install nextcloud
  hosts: nextcloud
  become: yes
 
  tasks:  
    - name: snap install nextcloud
      community.general.snap:
        name: nextcloud
        state: present

    - name: take a breather
      ansible.builtin.pause:
        seconds: 15

    - name: Create Nextcloud account
      ansible.builtin.shell:
        cmd: "nextcloud.manual-install admin password"
        creates: /var/snap/nextcloud/common/nextcloud/data/config.php

    - name: addition to trusted domains
      ansible.builtin.shell:
        cmd: "nextcloud.occ config:system:set trusted_domains 1 --value={{ansible_default_ipv4.address}}"

    - name: localhost to trusted domains
      ansible.builtin.shell:
        cmd: "nextcloud.occ config:system:set trusted_domains 2 --value=127.0.0.1"
